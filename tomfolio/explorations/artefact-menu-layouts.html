    <title>Artefact — menu layouts (low-fi)</title>

    <style>
      :root {
        --paper: #ece8df;
        --ink: #2a2636;
        --muted: #6f6a5c;
      }
      html,
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .sheet {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 24px 64px;
      }
      .sheet svg {
        width: 100%;
        height: auto;
        display: block;
      }
      svg text.th {
        fill: var(--ink);
        font-weight: 600;
      }
      svg text.t {
        fill: var(--ink);
      }
      svg text.ts {
        fill: var(--muted);
      }
      footer {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 24px 48px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
