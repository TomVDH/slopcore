<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bleu, a Tomtoolery design direction</title>
    <meta
      name="description"
      content="Drenched modernist direction for the Tomtoolery portfolio. One blue, one typeface, mathematical calm."
    />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0B27D6" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body class="kl">
    <a class="skip-link" href="#work">Skip to the work</a>

    <canvas id="gl" aria-hidden="true"></canvas>

    <header class="kl-nav">
      <a class="kl-brand" href="#top">tomtoolery</a>
      <nav class="kl-links" aria-label="Main">
        <a href="#work">Work</a>
        <a href="#index">Index</a>
        <a href="#hello">Say hello</a>
      </nav>
    </header>

    <main id="top">
      <section class="kl-hero" aria-label="Introduction">
        <div class="kl-wrap">
          <h1 class="kl-headline">Half marketer, half artist, all&nbsp;nerd.</h1>
          <p class="kl-sub">
            I plan campaigns by day and melt pixels after hours. This is the toolbox.
          </p>
          <a class="kl-btn" href="#work">See the work</a>
        </div>
      </section>

      <section class="kl-work" id="work" aria-labelledby="work-title">
        <div class="kl-wrap">
          <h2 class="kl-section-title" id="work-title">Selected work</h2>
          <div class="kl-grid"></div>
        </div>
      </section>

      <section class="kl-index" id="index" aria-labelledby="index-title">
        <div class="kl-wrap">
          <h2 class="kl-section-title" id="index-title">Index</h2>
          <div class="kl-index-rows"></div>
        </div>
      </section>

      <section class="kl-manifesto" aria-label="Manifesto">
        <div class="kl-wrap">
          <p class="kl-manifesto-text"></p>
        </div>
      </section>

      <footer class="kl-footer" id="hello" aria-labelledby="footer-title">
        <div class="kl-wrap">
          <h2 class="kl-footer-title" id="footer-title">Got something weird to build?</h2>
          <a class="kl-btn kl-btn-big" href="mailto:hello@tomtoolery.studio">Say hello</a>
          <div class="kl-footer-row"></div>
          <p class="kl-fineprint"></p>
        </div>
      </footer>
    </main>

    <a class="dir-pill kl-pill" href="/directions/">Directions</a>

    <script type="module" src="/src/directions/klein/page.ts"></script>
  </body>
</html>
