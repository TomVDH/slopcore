<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="ZENA FC — Sticker Club '26. Rip shimmering foil packs and collect Marcus Masterton reskinned for every nation."
    />
    <title>ZENA FC · Sticker Club '26</title>
  </head>
  <body>
    <!-- Full-viewport WebGL accent layer (foil shimmer + reveal burst). Created/owned by FoilScene. -->
    <div id="fx-layer" aria-hidden="true"></div>

    <div id="app">
      <header id="app-header"></header>
      <main id="stage" aria-label="Pack opening stage"></main>
      <aside id="panel" data-state="closed" aria-label="Sticker details"></aside>
      <section id="binder" aria-label="Your album"></section>
    </div>

    <!-- Polite live region for screen-reader announcements on every pull. -->
    <div id="live" class="sr-only" role="status" aria-live="polite"></div>

    <!-- Desktop-only gate: shown (via CSS) only on small screens. -->
    <div id="desktop-only" aria-hidden="true">
      <div class="desktop-only__inner">
        <p class="desktop-only__mark">ZENA FC</p>
        <h2>Built for the big screen</h2>
        <p>The Sticker Club is a desktop experience. Open it on a wider screen to rip packs and fill your album.</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
